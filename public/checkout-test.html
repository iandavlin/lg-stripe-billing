<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>lg-stripe-billing — checkout test</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://js.stripe.com/v3/"></script>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         max-width: 720px; margin: 2em auto; padding: 0 1em; }
  h1 { font-size: 22px; margin-bottom: .2em; }
  .sub { color: #777; margin-top: 0; font-size: 13px; }
  .row { margin: 0.6em 0; display: grid; grid-template-columns: 110px 1fr; gap: 8px; align-items: center; }
  input { padding: 6px 8px; font-size: 14px; width: 100%; }
  button { padding: 8px 16px; font-size: 14px; cursor: pointer; margin-top: .6em; }
  #checkout { margin-top: 1.2em; }
  pre { background: #1f1d1a; color: #eee; padding: .8em; overflow-x: auto; font: 12px/1.4 "SF Mono", Consolas, monospace;
        margin-top: 1em; border-radius: 4px; min-height: 4em; }
  .pill { display: inline-block; background: #f1ede5; color: #1f1d1a; padding: 1px 7px; border-radius: 10px;
          font: 12px/1.4 "SF Mono", Consolas, monospace; }
</style>
</head>
<body>

<h1>lg-stripe-billing — checkout test</h1>
<p class="sub">Embedded Stripe Checkout against the live dev API. Use card <span class="pill">4242 4242 4242 4242</span>, any future expiry, any 3-digit CVC, any ZIP.</p>

<div class="row"><label for="email">Email</label><input id="email" type="email" value="browsertest@example.com"></div>
<div class="row"><label for="priceId">Price ID</label><input id="priceId" type="text" value="price_1QlXoLHg6gcIV22bj141Eoke"></div>
<div class="row"><label for="country">Country</label><input id="country" type="text" placeholder="optional, e.g. IN" value=""></div>

<button id="start">Start Checkout</button>

<div id="checkout"></div>
<pre id="log">log:
</pre>

<script>
const log = (m) => {
  const el = document.getElementById('log');
  el.textContent += m + '\n';
  el.scrollTop = el.scrollHeight;
};

document.getElementById('start').addEventListener('click', async () => {
  try {
    const email   = document.getElementById('email').value.trim();
    const priceId = document.getElementById('priceId').value.trim();
    const country = document.getElementById('country').value.trim();

    const body = { price_id: priceId, email };
    if (country) body.country = country;

    log('→ POST /billing/v1/checkout ' + JSON.stringify(body));
    const sessRes = await fetch('/billing/v1/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const sessData = await sessRes.json();
    if (!sessData.clientSecret) {
      log('✗ checkout error: ' + JSON.stringify(sessData));
      return;
    }
    log('✓ clientSecret received');

    log('→ GET /billing/v1/config');
    const cfg = await (await fetch('/billing/v1/config')).json();
    if (!cfg.publishableKey) {
      log('✗ no publishableKey');
      return;
    }
    log('✓ publishableKey received');

    const stripe = Stripe(cfg.publishableKey);
    const checkout = await stripe.initEmbeddedCheckout({ clientSecret: sessData.clientSecret });
    checkout.mount('#checkout');
    log('✓ checkout mounted — complete the form to test /v1/return');
  } catch (err) {
    log('✗ ' + err.message);
  }
});
</script>

</body>
</html>
